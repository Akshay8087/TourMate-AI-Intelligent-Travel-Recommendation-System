<svg width="760" height="220" viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .model-card { animation: mCardIn 0.5s ease-out both; }
      .mc1{animation-delay:0.1s} .mc2{animation-delay:0.25s} .mc3{animation-delay:0.4s}
      .mc4{animation-delay:0.55s} .mc5{animation-delay:0.7s} .mc6{animation-delay:0.85s}
      @keyframes mCardIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
      .score-bar { animation: scoreGrow 1.5s ease-out both; transform-origin: left; }
      .sb1{animation-delay:0.5s} .sb2{animation-delay:0.65s} .sb3{animation-delay:0.8s}
      .sb4{animation-delay:0.95s} .sb5{animation-delay:1.1s} .sb6{animation-delay:1.25s}
      @keyframes scoreGrow { from{transform:scaleX(0)} to{transform:scaleX(1)} }
    </style>
    <linearGradient id="mc1g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0ea5e9"/><stop offset="100%" style="stop-color:#38bdf8"/></linearGradient>
    <linearGradient id="mc2g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#52c27a"/><stop offset="100%" style="stop-color:#86efac"/></linearGradient>
    <linearGradient id="mc3g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#d4a373"/><stop offset="100%" style="stop-color:#fbbf24"/></linearGradient>
    <linearGradient id="mc4g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#8b5cf6"/><stop offset="100%" style="stop-color:#c4b5fd"/></linearGradient>
    <linearGradient id="mc5g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#f97316"/><stop offset="100%" style="stop-color:#fdba74"/></linearGradient>
    <linearGradient id="mc6g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ec4899"/><stop offset="100%" style="stop-color:#f9a8d4"/></linearGradient>
    <filter id="ms"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0ea5e9" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="760" height="220" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="380" y="22" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700" font-family="Georgia,serif">🤖 All 7 ML Models — Performance at a Glance</text>

  <!-- Card 1: Hybrid -->
  <g class="model-card mc1">
    <rect x="12" y="34" width="116" height="170" rx="12" fill="url(#mc1g)" filter="url(#ms)"/>
    <text x="70" y="62" text-anchor="middle" fill="white" font-size="18">⚡</text>
    <text x="70" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Arial,sans-serif">HYBRID</text>
    <text x="70" y="96" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8.5" font-family="Arial,sans-serif">Recommender</text>
    <rect x="22" y="108" width="96" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
    <rect x="22" y="108" width="96" height="4" rx="2" fill="rgba(255,255,255,0.85)" class="score-bar sb1"/>
    <text x="70" y="128" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="Georgia,serif">74%</text>
    <text x="70" y="142" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">Coverage</text>
    <text x="70" y="158" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">P@5: 0.84</text>
    <rect x="22" y="170" width="96" height="18" rx="9" fill="rgba(255,255,255,0.2)"/>
    <text x="70" y="183" text-anchor="middle" fill="white" font-size="8.5" font-weight="700" font-family="Arial,sans-serif">★ Production</text>
  </g>

  <!-- Card 2: Content -->
  <g class="model-card mc2">
    <rect x="137" y="34" width="116" height="170" rx="12" fill="url(#mc2g)" filter="url(#ms)"/>
    <text x="195" y="62" text-anchor="middle" fill="white" font-size="18">📝</text>
    <text x="195" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Arial,sans-serif">CONTENT</text>
    <text x="195" y="96" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8.5" font-family="Arial,sans-serif">TF-IDF + KNN</text>
    <rect x="147" y="108" width="96" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
    <rect x="147" y="108" width="67" height="4" rx="2" fill="rgba(255,255,255,0.85)" class="score-bar sb2"/>
    <text x="195" y="128" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="Georgia,serif">2,241</text>
    <text x="195" y="142" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">TF-IDF Terms</text>
    <text x="195" y="158" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">P@10: 0.78</text>
    <rect x="147" y="170" width="96" height="18" rx="9" fill="rgba(255,255,255,0.2)"/>
    <text x="195" y="183" text-anchor="middle" fill="white" font-size="8.5" font-weight="700" font-family="Arial,sans-serif">✓ Production</text>
  </g>

  <!-- Card 3: Popularity -->
  <g class="model-card mc3">
    <rect x="262" y="34" width="116" height="170" rx="12" fill="url(#mc3g)" filter="url(#ms)"/>
    <text x="320" y="62" text-anchor="middle" fill="white" font-size="18">📊</text>
    <text x="320" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Arial,sans-serif">POPULARITY</text>
    <text x="320" y="96" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8.5" font-family="Arial,sans-serif">Weighted Score</text>
    <rect x="272" y="108" width="96" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
    <rect x="272" y="108" width="38" height="4" rx="2" fill="rgba(255,255,255,0.85)" class="score-bar sb3"/>
    <text x="320" y="128" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="Georgia,serif">15%</text>
    <text x="320" y="142" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">Coverage</text>
    <text x="320" y="158" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">P@5: 0.71</text>
    <rect x="272" y="170" width="96" height="18" rx="9" fill="rgba(255,255,255,0.2)"/>
    <text x="320" y="183" text-anchor="middle" fill="white" font-size="8.5" font-weight="700" font-family="Arial,sans-serif">Baseline</text>
  </g>

  <!-- Card 4: RF Classifier -->
  <g class="model-card mc4">
    <rect x="387" y="34" width="116" height="170" rx="12" fill="url(#mc4g)" filter="url(#ms)"/>
    <text x="445" y="62" text-anchor="middle" fill="white" font-size="18">🌳</text>
    <text x="445" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Arial,sans-serif">CLASSIFIER</text>
    <text x="445" y="96" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8.5" font-family="Arial,sans-serif">Random Forest</text>
    <rect x="397" y="108" width="96" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
    <rect x="397" y="108" width="96" height="4" rx="2" fill="rgba(255,255,255,0.85)" class="score-bar sb4"/>
    <text x="445" y="128" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="Georgia,serif">F1=1.0</text>
    <text x="445" y="142" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">200 Trees</text>
    <text x="445" y="158" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">Acc: 100%</text>
    <rect x="397" y="170" width="96" height="18" rx="9" fill="rgba(255,255,255,0.2)"/>
    <text x="445" y="183" text-anchor="middle" fill="white" font-size="8.5" font-weight="700" font-family="Arial,sans-serif">✓ Production</text>
  </g>

  <!-- Card 5: GBR -->
  <g class="model-card mc5">
    <rect x="512" y="34" width="116" height="170" rx="12" fill="url(#mc5g)" filter="url(#ms)"/>
    <text x="570" y="62" text-anchor="middle" fill="white" font-size="18">📈</text>
    <text x="570" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Arial,sans-serif">REGRESSOR</text>
    <text x="570" y="96" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8.5" font-family="Arial,sans-serif">Grad. Boosting</text>
    <rect x="522" y="108" width="96" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
    <rect x="522" y="108" width="33" height="4" rx="2" fill="rgba(255,255,255,0.85)" class="score-bar sb5"/>
    <text x="570" y="128" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="Georgia,serif">R²=0.34</text>
    <text x="570" y="142" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">RMSE: 0.2925</text>
    <text x="570" y="158" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">±0.5: 87%</text>
    <rect x="522" y="170" width="96" height="18" rx="9" fill="rgba(255,255,255,0.2)"/>
    <text x="570" y="183" text-anchor="middle" fill="white" font-size="8.5" font-weight="700" font-family="Arial,sans-serif">✓ Production</text>
  </g>

  <!-- Card 6: KMeans -->
  <g class="model-card mc6">
    <rect x="637" y="34" width="111" height="170" rx="12" fill="url(#mc6g)" filter="url(#ms)"/>
    <text x="692" y="62" text-anchor="middle" fill="white" font-size="18">🔵</text>
    <text x="692" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Arial,sans-serif">CLUSTERING</text>
    <text x="692" y="96" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8.5" font-family="Arial,sans-serif">KMeans k=6</text>
    <rect x="647" y="108" width="90" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
    <rect x="647" y="108" width="60" height="4" rx="2" fill="rgba(255,255,255,0.85)" class="score-bar sb6"/>
    <text x="692" y="128" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="Georgia,serif">6</text>
    <text x="692" y="142" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">Clusters</text>
    <text x="692" y="158" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="Arial,sans-serif">Elbow+Silhouette</text>
    <rect x="647" y="170" width="90" height="18" rx="9" fill="rgba(255,255,255,0.2)"/>
    <text x="692" y="183" text-anchor="middle" fill="white" font-size="8.5" font-weight="700" font-family="Arial,sans-serif">✓ Production</text>
  </g>
</svg>