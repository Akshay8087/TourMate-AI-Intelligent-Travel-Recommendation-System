<svg width="780" height="170" viewBox="0 0 780 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="problemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fef2f2"/>
      <stop offset="100%" style="stop-color:#fee2e2"/>
    </linearGradient>
    <linearGradient id="solutionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ecfdf5"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <style>
      .slide-in-left { animation: slideLeft 0.8s ease-out both; }
      .slide-in-right { animation: slideRight 0.8s 0.3s ease-out both; }
      @keyframes slideLeft { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
      @keyframes slideRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
    </style>
  </defs>
  <!-- Problem box -->
  <rect x="10" y="10" width="350" height="150" rx="14" fill="url(#problemGrad)" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="185" y="38" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="700" font-family="Arial,sans-serif">❌ THE PROBLEM</text>
  <line x1="30" y1="46" x2="340" y2="46" stroke="#fca5a5" stroke-width="1"/>
  <text x="185" y="70" text-anchor="middle" fill="#7f1d1d" font-size="11.5" font-family="Arial,sans-serif">Discovery overload — millions of options</text>
  <text x="185" y="90" text-anchor="middle" fill="#7f1d1d" font-size="11.5" font-family="Arial,sans-serif">Budget / season mismatch in results</text>
  <text x="185" y="110" text-anchor="middle" fill="#7f1d1d" font-size="11.5" font-family="Arial,sans-serif">Popularity rankings ignore preferences</text>
  <text x="185" y="130" text-anchor="middle" fill="#7f1d1d" font-size="11.5" font-family="Arial,sans-serif">Hidden gems suppressed forever</text>
  <text x="185" y="150" text-anchor="middle" fill="#7f1d1d" font-size="11.5" font-family="Arial,sans-serif">No explainability — "why this?"</text>
  <!-- Arrow -->
  <text x="390" y="93" text-anchor="middle" fill="#0ea5e9" font-size="28" font-weight="700">→</text>
  <!-- Solution box -->
  <rect x="420" y="10" width="350" height="150" rx="14" fill="url(#solutionGrad)" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="595" y="38" text-anchor="middle" fill="#065f46" font-size="13" font-weight="700" font-family="Arial,sans-serif">✅ TOURMATE AI SOLUTION</text>
  <line x1="440" y1="46" x2="750" y2="46" stroke="#6ee7b7" stroke-width="1"/>
  <text x="595" y="70" text-anchor="middle" fill="#064e3b" font-size="11.5" font-family="Arial,sans-serif">6-signal hybrid scoring + NLP retrieval</text>
  <text x="595" y="90" text-anchor="middle" fill="#064e3b" font-size="11.5" font-family="Arial,sans-serif">Budget × season × category compatibility</text>
  <text x="595" y="110" text-anchor="middle" fill="#064e3b" font-size="11.5" font-family="Arial,sans-serif">Personalized weighted recommendations</text>
  <text x="595" y="130" text-anchor="middle" fill="#064e3b" font-size="11.5" font-family="Arial,sans-serif">Novelty boost for hidden gem discovery</text>
  <text x="595" y="150" text-anchor="middle" fill="#064e3b" font-size="11.5" font-family="Arial,sans-serif">Gemini AI explains every suggestion</text>
</svg>