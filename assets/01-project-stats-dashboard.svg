<svg width="860" height="140" viewBox="0 0 860 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#e0f2fe;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ecfdf5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#52c27a"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a373"/>
      <stop offset="100%" style="stop-color:#a16207"/>
    </linearGradient>
    <linearGradient id="purpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0ea5e9" flood-opacity="0.15"/>
    </filter>
    <style>
      .stat-card { transition: all 0.3s; }
      .stat-num { font-family: Georgia, serif; font-weight: 700; }
      .stat-label { font-family: Arial, sans-serif; font-weight: 600; }
      .pulse { animation: pulse 2s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
      .float1 { animation: float1 3s ease-in-out infinite; }
      .float2 { animation: float2 3.5s ease-in-out infinite; }
      .float3 { animation: float3 4s ease-in-out infinite; }
      @keyframes float1 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-4px)} }
      @keyframes float2 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-6px)} }
      @keyframes float3 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-3px)} }
    </style>
  </defs>
  <!-- Background -->
  <rect width="860" height="140" rx="20" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Card 1: Records -->
  <g class="float1" transform="translate(20,15)">
    <rect width="140" height="110" rx="14" fill="url(#skyGrad)" filter="url(#shadow)"/>
    <text x="70" y="30" text-anchor="middle" fill="white" font-size="22" opacity="0.9">📊</text>
    <text x="70" y="62" text-anchor="middle" fill="white" font-size="22" font-weight="700" font-family="Georgia,serif">100K</text>
    <text x="70" y="80" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Arial,sans-serif" font-weight="600">RECORDS</text>
    <text x="70" y="98" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9.5" font-family="Arial,sans-serif">Tourism Visits</text>
  </g>
  <!-- Card 2: Attractions -->
  <g class="float2" transform="translate(175,15)">
    <rect width="140" height="110" rx="14" fill="url(#mintGrad)" filter="url(#shadow)"/>
    <text x="70" y="30" text-anchor="middle" fill="white" font-size="22" opacity="0.9">🗺️</text>
    <text x="70" y="62" text-anchor="middle" fill="white" font-size="22" font-weight="700" font-family="Georgia,serif">431</text>
    <text x="70" y="80" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Arial,sans-serif" font-weight="600">ATTRACTIONS</text>
    <text x="70" y="98" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9.5" font-family="Arial,sans-serif">Unique Destinations</text>
  </g>
  <!-- Card 3: Rating -->
  <g class="float1" transform="translate(330,15)">
    <rect width="140" height="110" rx="14" fill="url(#sandGrad)" filter="url(#shadow)"/>
    <text x="70" y="30" text-anchor="middle" fill="white" font-size="22" opacity="0.9">⭐</text>
    <text x="70" y="62" text-anchor="middle" fill="white" font-size="22" font-weight="700" font-family="Georgia,serif">4.43</text>
    <text x="70" y="80" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Arial,sans-serif" font-weight="600">AVG RATING</text>
    <text x="70" y="98" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9.5" font-family="Arial,sans-serif">Out of 5.0</text>
  </g>
  <!-- Card 4: Provinces -->
  <g class="float3" transform="translate(485,15)">
    <rect width="140" height="110" rx="14" fill="url(#purpGrad)" filter="url(#shadow)"/>
    <text x="70" y="30" text-anchor="middle" fill="white" font-size="22" opacity="0.9">🏙️</text>
    <text x="70" y="62" text-anchor="middle" fill="white" font-size="22" font-weight="700" font-family="Georgia,serif">22</text>
    <text x="70" y="80" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Arial,sans-serif" font-weight="600">PROVINCES</text>
    <text x="70" y="98" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9.5" font-family="Arial,sans-serif">Across China</text>
  </g>
  <!-- Card 5: Models -->
  <g class="float2" transform="translate(640,15)">
    <rect width="140" height="110" rx="14" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="30" text-anchor="middle" fill="white" font-size="22" opacity="0.9">🤖</text>
    <text x="70" y="62" text-anchor="middle" fill="white" font-size="22" font-weight="700" font-family="Georgia,serif">7</text>
    <text x="70" y="80" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Arial,sans-serif" font-weight="600">ML MODELS</text>
    <text x="70" y="98" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9.5" font-family="Arial,sans-serif">Trained &amp; Deployed</text>
  </g>
</svg>