<svg width="760" height="200" viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .metric-fill { animation: metricGrow 2s ease-out both; transform-origin: left; }
      .mf1{animation-delay:0.3s} .mf2{animation-delay:0.5s} .mf3{animation-delay:0.7s}
      .mf4{animation-delay:0.9s} .mf5{animation-delay:1.1s} .mf6{animation-delay:1.3s}
      @keyframes metricGrow { from{transform:scaleX(0)} to{transform:scaleX(1)} }
    </style>
    <linearGradient id="mfg1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0ea5e9"/><stop offset="100%" style="stop-color:#52c27a"/></linearGradient>
    <linearGradient id="mfg2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#52c27a"/><stop offset="100%" style="stop-color:#86efac"/></linearGradient>
    <linearGradient id="mfg3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#8b5cf6"/><stop offset="100%" style="stop-color:#c4b5fd"/></linearGradient>
    <linearGradient id="mfg4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f97316"/><stop offset="100%" style="stop-color:#fdba74"/></linearGradient>
    <linearGradient id="mfg5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0ea5e9"/><stop offset="100%" style="stop-color:#38bdf8"/></linearGradient>
    <linearGradient id="mfg6" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#ec4899"/><stop offset="100%" style="stop-color:#f9a8d4"/></linearGradient>
  </defs>
  <rect width="760" height="200" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="380" y="22" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700" font-family="Georgia,serif">📊 Final Evaluation Metrics</text>

  <!-- Metric 1 -->
  <text x="10" y="52" fill="#64748b" font-size="10.5" font-family="Arial,sans-serif">Clf F1-Weighted</text>
  <rect x="160" y="40" width="530" height="16" rx="5" fill="#f1f5f9"/>
  <rect x="160" y="40" width="530" height="16" rx="5" fill="url(#mfg1)" class="metric-fill mf1"/>
  <text x="700" y="52" fill="#0284c7" font-size="10" font-weight="700" font-family="Arial,sans-serif">1.0000</text>

  <!-- Metric 2 -->
  <text x="10" y="80" fill="#64748b" font-size="10.5" font-family="Arial,sans-serif">Clf Accuracy</text>
  <rect x="160" y="68" width="530" height="16" rx="5" fill="#f1f5f9"/>
  <rect x="160" y="68" width="530" height="16" rx="5" fill="url(#mfg2)" class="metric-fill mf2"/>
  <text x="700" y="80" fill="#16a34a" font-size="10" font-weight="700" font-family="Arial,sans-serif">1.0000</text>

  <!-- Metric 3 -->
  <text x="10" y="108" fill="#64748b" font-size="10.5" font-family="Arial,sans-serif">Reg R² Score</text>
  <rect x="160" y="96" width="530" height="16" rx="5" fill="#f1f5f9"/>
  <rect x="160" y="96" width="179" height="16" rx="5" fill="url(#mfg3)" class="metric-fill mf3"/>
  <text x="700" y="108" fill="#6d28d9" font-size="10" font-weight="700" font-family="Arial,sans-serif">0.3390</text>

  <!-- Metric 4 -->
  <text x="10" y="136" fill="#64748b" font-size="10.5" font-family="Arial,sans-serif">Rec Coverage</text>
  <rect x="160" y="124" width="530" height="16" rx="5" fill="#f1f5f9"/>
  <rect x="160" y="124" width="392" height="16" rx="5" fill="url(#mfg4)" class="metric-fill mf4"/>
  <text x="700" y="136" fill="#c2410c" font-size="10" font-weight="700" font-family="Arial,sans-serif">74.01%</text>

  <!-- Metric 5 -->
  <text x="10" y="164" fill="#64748b" font-size="10.5" font-family="Arial,sans-serif">Precision@5</text>
  <rect x="160" y="152" width="530" height="16" rx="5" fill="#f1f5f9"/>
  <rect x="160" y="152" width="445" height="16" rx="5" fill="url(#mfg5)" class="metric-fill mf5"/>
  <text x="700" y="164" fill="#0284c7" font-size="10" font-weight="700" font-family="Arial,sans-serif">0.8400</text>

  <!-- Metric 6 -->
  <text x="10" y="192" fill="#64748b" font-size="10.5" font-family="Arial,sans-serif">Rec Novelty</text>
  <rect x="160" y="180" width="530" height="16" rx="5" fill="#f1f5f9"/>
  <rect x="160" y="180" width="222" height="16" rx="5" fill="url(#mfg6)" class="metric-fill mf6"/>
  <text x="700" y="192" fill="#be123c" font-size="10" font-weight="700" font-family="Arial,sans-serif">0.4200</text>
</svg>