    <text x="310" y="74" text-anchor="middle" fill="#f97316" font-size="9.5" font-weight="700" font-family="Arial,sans-serif">CATEGORIES</text>
    <text x="310" y="87" text-anchor="middle" fill="#fdba74" font-size="8.5" font-family="Arial,sans-serif">Tourism Types</text>
