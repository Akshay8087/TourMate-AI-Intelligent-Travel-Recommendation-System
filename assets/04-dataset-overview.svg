    <text x="189" y="74" text-anchor="middle" fill="#10b981" font-size="9.5" font-weight="700" font-family="Arial,sans-serif">DATE RANGE</text>
    <text x="189" y="87" text-anchor="middle" fill="#6ee7b7" font-size="8.5" font-family="Arial,sans-serif">2.5 Years Data</text>
