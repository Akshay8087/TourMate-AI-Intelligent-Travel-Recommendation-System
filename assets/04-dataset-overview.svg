      .chip { font-family: Arial,sans-serif; font-size: 11px; font-weight: 600; }
      .pop-in { animation: popIn 0.5s ease-out both; }
      .pop-in-2 { animation: popIn 0.5s 0.1s ease-out both; }
      .pop-in-3 { animation: popIn 0.5s 0.2s ease-out both; }
      .pop-in-4 { animation: popIn 0.5s 0.3s ease-out both; }
      .pop-in-5 { animation: popIn 0.5s 0.4s ease-out both; }
      .pop-in-6 { animation: popIn 0.5s 0.5s ease-out both; }
      @keyframes popIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
    </style>
  </defs>
  <rect width="760" height="110" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <!-- Item 1 -->
  <g class="pop-in">
    <rect x="12" y="15" width="112" height="80" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="68" y="42" text-anchor="middle" font-size="20">📋</text>
    <text x="68" y="60" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="700" font-family="Georgia,serif">25</text>
