      .fade-in-2 { animation: fadeIn 0.6s 0.3s ease-out both; }
      .fade-in-3 { animation: fadeIn 0.6s 0.6s ease-out both; }
      @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      .ping { animation: ping 2s 1s infinite; }
      @keyframes ping { 0%{transform:scale(1);opacity:1} 75%{transform:scale(1.4);opacity:0} 100%{transform:scale(1);opacity:0} }
